<body class="p-8">
    <div class="glass max-w-5xl mx-auto p-8 grid md:grid-cols-2 gap-10">
        <div>
            <img id="detail-img" src="" class="w-full rounded-2xl shadow-lg">
        </div>
        <div>
            <h2 id="detail-title" class="text-4xl font-bold mb-2"></h2>
            <p id="detail-price" class="text-2xl text-blue-600 mb-6"></p>
            <p id="detail-desc" class="mb-6 text-gray-700 leading-relaxed"></p>
            
            <div class="mb-6">
                <label class="font-bold block mb-2">Pilih Warna:</label>
                <div class="flex gap-2 flex-wrap" id="color-options">
                    </div>
            </div>

            <div class="mb-8">
                <label class="font-bold block mb-2">Jumlah & Stok:</label>
                <div class="flex items-center gap-4">
                    <input type="number" value="1" min="1" class="w-16 p-2 rounded-lg border">
                    <span class="text-sm text-green-600">Tersedia: <span id="stok-num">45</span> pcs</span>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="addToCart()" class="flex-1 bg-serenity py-4 rounded-xl font-bold text-white hover:opacity-80 transition">Tambah ke Keranjang</button>
                <button onclick="buyNow()" class="flex-1 bg-rose-300 py-4 rounded-xl font-bold text-gray-800 hover:opacity-80 transition">Beli Sekarang</button>
            </div>

            <div class="mt-10 pt-10 border-t">
                <h4 class="font-bold mb-4">Ulasan Pelanggan (120+)</h4>
                <div class="bg-white/30 p-4 rounded-xl mb-2 italic">"Bahannya sangat adem dan warnanya sesuai foto! - Sarah"</div>
                <div class="bg-white/30 p-4 rounded-xl italic">"Packaging rapi, pengiriman cepat. Bakal beli lagi! - Amira"</div>
            </div>
        </div>
    </div>
</body>
