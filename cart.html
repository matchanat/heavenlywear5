<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja | Heavenly Wear</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; }
        .cart-container { padding: 120px 5% 50px; display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* List Produk */
        .cart-items-section h2 { font-family: 'Playfair Display', serif; margin-bottom: 30px; font-size: 2rem; }
        .cart-card { 
            display: flex; align-items: center; background: white; padding: 20px; 
            border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: 0.3s; border: 1px solid #f0f0f0;
        }
        .cart-card img { width: 100px; height: 120px; object-fit: cover; border-radius: 12px; margin-right: 20px; }
        .cart-details { flex: 1; }
        .cart-details h4 { font-size: 1.1rem; margin-bottom: 5px; color: #333; }
        .cart-details p { font-size: 0.9rem; color: #888; margin-bottom: 10px; }
        
        /* Kontrol Jumlah */
        .qty-controls { display: flex; align-items: center; gap: 15px; background: #f9f9f9; width: fit-content; padding: 5px 15px; border-radius: 25px; }
        .qty-btn { border: none; background: none; font-size: 1.2rem; cursor: pointer; color: var(--dark-pink); font-weight: bold; }
        
        .remove-item { color: #ff4d4d; cursor: pointer; font-size: 0.85rem; margin-top: 10px; display: inline-block; text-decoration: underline; }

        /* Ringkasan Pesanan */
        .summary-card { 
            background: white; padding: 35px; border-radius: 25px; height: fit-content; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid var(--pink);
            position: sticky; top: 120px;
        }
        .summary-card h3 { font-family: 'Playfair Display', serif; margin-bottom: 25px; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.95rem; }
        .total-line { border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; font-weight: 600; font-size: 1.2rem; color: var(--dark-pink); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #555; }
        .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: 'Poppins'; }

        .btn-checkout { 
            width: 100%; padding: 18px; border-radius: 35px; border: none; 
            background: var(--dark-pink); color: white; font-weight: 600; 
            font-size: 1rem; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(240, 98, 146, 0.2);
            transition: 0.3s;
        }
        .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(240, 98, 146, 0.3); }

        @media (max-width: 900px) {
            .cart-container { grid-template-columns: 1fr; padding-top: 100px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">Heavenly Wear</div>
        <div class="nav-links">
            <a href="index.html#catalog">Lanjut Belanja</a>
        </div>
    </nav>

    <div class="cart-container">
        <div class="cart-items-section">
            <h2>Keranjang Belanja</h2>
            <div id="cartContent">
                </div>
        </div>

        <div class="summary-card">
            <h3>Ringkasan Pesanan</h3>
            
            <div class="summary-line">
                <span>Subtotal Produk</span>
                <span id="subtotalText">Rp 0</span>
            </div>

            <div class="form-group">
                <label>Pilih Opsi Pengiriman</label>
                <select id="shippingOption" onchange="updateTotal()">
                    <option value="10000">Reguler - Rp 10.000 (3-5 Hari)</option>
                    <option value="25000">Kilat - Rp 25.000 (1-2 Hari)</option>
                    <option value="0">Ambil Di Toko - Rp 0</option>
                </select>
            </div>

            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select id="paymentMethod">
                    <option>Transfer Bank BCA</option>
                    <option>Mandiri Virtual Account</option>
                    <option>ShopeePay / GoPay / Qris</option>
                    <option>COD (Bayar di Tempat)</option>
                </select>
            </div>

            <div class="summary-line total-line">
                <span>Total Bayar</span>
                <span id="grandTotalText">Rp 0</span>
            </div>

            <button class="btn-checkout" onclick="confirmPayment()">Proses Pembayaran Sekarang</button>
            <p style="font-size: 0.75rem; color: #999; text-align: center; margin-top: 15px;">
                *Pesanan akan diteruskan ke tim admin via WhatsApp untuk konfirmasi manual.
            </p>
        </div>
    </div>

    <script>
        // Fungsi untuk me-load data keranjang
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('heavenlyCart')) || [];
            const container = document.getElementById('cartContent');
            let subtotal = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px;">
                        <p style="color:#888;">Wah, keranjangmu masih kosong...</p>
                        <a href="index.html#catalog" style="color:var(--dark-pink); font-weight:600;">Lihat Koleksi Hijab ✨</a>
                    </div>`;
                document.getElementById('subtotalText').innerText = "Rp 0";
                updateTotal();
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                const totalItemPrice = item.price * item.qty;
                subtotal += totalItemPrice;
                return `
                    <div class="cart-card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-details">
                            <h4>${item.name}</h4>
                            <p>Varian Warna: <strong>${item.color}</strong></p>
                            <p style="color:var(--dark-pink); font-weight:600;">Rp ${item.price.toLocaleString()}</p>
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                            </div>
                            <span class="remove-item" onclick="removeItem(${index})">Hapus Produk</span>
                        </div>
                        <div style="font-weight:600;">Rp ${totalItemPrice.toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotalText').innerText = `Rp ${subtotal.toLocaleString()}`;
            localStorage.setItem('cartSubtotal', subtotal);
            updateTotal();
        }

        // Fungsi mengubah jumlah (qty)
        function changeQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('heavenlyCart'));
            cart[index].qty = parseInt(cart[index].qty) + delta;
            
            if (cart[index].qty < 1) cart[index].qty = 1;
            
            localStorage.setItem('heavenlyCart', JSON.stringify(cart));
            loadCart();
        }

        // Fungsi hapus item
        function removeItem(index) {
            if (confirm("Hapus hijab cantik ini dari keranjang?")) {
                let cart = JSON.parse(localStorage.getItem('heavenlyCart'));
                cart.splice(index, 1);
                localStorage.setItem('heavenlyCart', JSON.stringify(cart));
                loadCart();
                // Update badge di navbar jika ada
                if (window.opener) window.opener.updateCartUI();
            }
        }

        // Update Total Akhir
        function updateTotal() {
            const subtotal = parseInt(localStorage.getItem('cartSubtotal')) || 0;
            const shipping = parseInt(document.getElementById('shippingOption').value);
            const total = subtotal + shipping;
            document.getElementById('grandTotalText').innerText = `Rp ${total.toLocaleString()}`;
        }

        // Konfirmasi Pembelian
        function confirmPayment() {
            const cart = JSON.parse(localStorage.getItem('heavenlyCart')) || [];
            if (cart.length === 0) return alert("Keranjang Anda kosong!");

            const isConfirmed = confirm("Konfirmasi Pesanan?\n\nKami akan mengarahkan Anda ke WhatsApp Admin untuk rincian pembayaran akhir.");
            
            if (isConfirmed) {
                const total = document.getElementById('grandTotalText').innerText;
                const payment = document.getElementById('paymentMethod').value;
                
                // Membuat pesan otomatis untuk WA
                let message = `Halo Heavenly Wear, saya ingin order:\n`;
                cart.forEach(item => {
                    message += `- ${item.name} (${item.color}) x${item.qty}\n`;
                });
                message += `\nMetode: ${payment}\nTotal: ${total}\n\nMohon rincian rekeningnya ya Min! ✨`;
                
                // Clear cart setelah checkout (Opsional, biasanya setelah bayar, tapi untuk web statis dilakukan di sini)
                // localStorage.removeItem('heavenlyCart'); 
                
                window.location.href = `https://wa.me/628123456789?text=${encodeURIComponent(message)}`;
            }
        }

        // Jalankan saat load
        window.onload = loadCart;
    </script>
</body>
</html>
